<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrakby - Photography Studio</title>
    
    <!-- Favicon (أيقونة التبويب) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📸</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Tajawal', 'sans-serif'], signature: ['"Great Vibes"', 'cursive'] } } }
        }
    </script>

    <style type="text/tailwindcss">
        body { font-family: 'Tajawal', sans-serif; }
        .font-signature { font-family: 'Great Vibes', cursive; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #f43f5e; }
        
        .tab-active-photography { @apply bg-gradient-to-r from-amber-500 to-orange-500 text-white shadow-md shadow-orange-500/20 scale-100; }
        .tab-active-photoOnly { @apply bg-gradient-to-r from-indigo-500 to-violet-500 text-white shadow-md shadow-indigo-500/20 scale-100; }
        .tab-active-video { @apply bg-gradient-to-r from-blue-500 to-cyan-500 text-white shadow-md shadow-cyan-500/20 scale-100; }
        .tab-active-tableaus { @apply bg-gradient-to-r from-fuchsia-500 to-pink-500 text-white shadow-md shadow-pink-500/20 scale-100; }
        .tab-active-gifts { @apply bg-gradient-to-r from-emerald-500 to-teal-500 text-white shadow-md shadow-teal-500/20 scale-100; }
        .tab-inactive { @apply text-stone-500 hover:bg-white hover:text-stone-900 hover:shadow-sm scale-100; }

        @keyframes camera-flash {
          0%, 85% { opacity: 0; transform: scale(0.5); box-shadow: none; }
          88% { opacity: 1; transform: scale(2.5); box-shadow: 0 0 20px 10px rgba(255,255,255,0.9); }
          90% { opacity: 0; transform: scale(0.5); box-shadow: none; }
          92% { opacity: 1; transform: scale(2.5); box-shadow: 0 0 20px 10px rgba(255,255,255,0.9); }
          95%, 100% { opacity: 0; transform: scale(0.5); box-shadow: none; }
        }
        .animate-camera-flash { animation: camera-flash 4s ease-in-out infinite; }
        
        .glass-panel { @apply bg-white/60 backdrop-blur-lg border border-white shadow-xl rounded-[2rem]; }
    </style>
</head>
<body class="min-h-screen selection:bg-rose-400 selection:text-white pb-20 bg-[#fdfbf7] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-rose-50 via-orange-50 to-amber-50 text-stone-800 transition-colors duration-500">

    <div id="app-root"></div>

    <!-- Firebase & Logic Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, getDocs, updateDoc, addDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ============================================================================
        // 🔴 إعدادات قاعدة بيانات فايربيس (Firebase Config) 🔴
        // ============================================================================
        const firebaseConfig = {
          apiKey: "AIzaSyCI0L2fO4_bdltYF7Hddjcxa6seSDbrMwc",
          authDomain: "studio-noot.firebaseapp.com",
          databaseURL: "https://studio-noot-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "studio-noot",
          storageBucket: "studio-noot.firebasestorage.app",
          messagingSenderId: "376391287753",
          appId: "1:376391287753:web:58219ac850bde7e2a79e18"
        };

        window.state = {
            activeTab: 'photography',
            isAdmin: new URLSearchParams(window.location.search).get('admin') === 'true',
            portalReceipt: new URLSearchParams(window.location.search).get('portal'),
            isEditMode: false,
            selectedAddons: [],
            currentPromoIdx: 0,
            menuData: getInitialData(),
            db: null,
            auth: null,
            appId: typeof __app_id !== 'undefined' ? __app_id : 'mrakby-studio-app',
            notes: "تأكيد الحجز وتثبيت الموعد يتطلب دفع مبلغ عربون مقدماً.\nرسوم تذكرة دخول مكان التصوير (الأرضية) غير شاملة في الباقة وتكون على نفقة العميل."
        };

        const initFirebase = async () => {
            let config = null;
            if (firebaseConfig && firebaseConfig.apiKey) {
                config = firebaseConfig;
            } else if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                config = JSON.parse(__firebase_config);
            }

            if (config) {
                const app = initializeApp(config);
                state.auth = getAuth(app);
                state.db = getFirestore(app);
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(state.auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(state.auth);
                    }
                    setupDBListeners();
                } catch(e) { console.warn("Auth failed", e); renderApp(); }
            } else {
                renderApp(); 
            }
        };

        function setupDBListeners() {
            if (!state.db || !state.auth.currentUser) return renderApp();
            const menuRef = doc(state.db, 'artifacts', state.appId, 'public', 'data', 'studio_menu', 'latest');
            onSnapshot(menuRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.menuData = data.menuData || state.menuData;
                    state.notes = data.notes || state.notes;
                }
                renderApp();
            }, (err) => { console.error(err); renderApp(); });
        }

        async function saveBookingToDB(bookingInfo) {
            if (!state.db) return;
            const bookingsRef = collection(state.db, 'artifacts', state.appId, 'public', 'data', 'studio_bookings');
            await addDoc(bookingsRef, bookingInfo);
        }

        initFirebase();
        
        setInterval(() => {
            const promos = state.menuData.promos[state.activeTab];
            if (promos && promos.isActive && promos.images && promos.images.length > 1) {
                state.currentPromoIdx = (state.currentPromoIdx + 1) % promos.images.length;
                renderPromoSection();
            }
        }, 3500);

        window.renderApp = () => {
            const root = document.getElementById('app-root');
            if (state.portalReceipt) {
                root.innerHTML = renderPortalView();
            } else {
                root.innerHTML = `
                    ${renderHeader()}
                    <main class="max-w-5xl mx-auto px-4 py-8 md:py-10">
                        <div id="promo-container">${renderPromoSection()}</div>
                        ${renderControls()}
                        <div id="items-container" class="animate-in fade-in slide-in-from-bottom-8 duration-700">
                            ${renderItemsSection()}
                        </div>
                    </main>
                    ${renderFloatingCart()}
                    <div id="modals-container"></div>
                `;
            }
            lucide.createIcons();
        };

        window.renderHeader = function() {
            return `
            <header class="bg-white/30 backdrop-blur-2xl border-b border-white/60 sticky top-0 z-40 shadow-sm">
                <div class="max-w-6xl mx-auto px-4">
                    <div class="relative flex justify-center items-center py-4">
                        <div class="flex items-center gap-3 md:gap-4 shrink-0">
                            <div class="relative w-12 h-12 md:w-14 md:h-14 rounded-full bg-stone-900 flex items-center justify-center text-white shadow-lg shadow-stone-900/20 shrink-0">
                                <i data-lucide="aperture" class="w-6 h-6 md:w-7 md:h-7 animate-[spin_5s_linear_infinite]"></i>
                                <div class="absolute inset-0 m-auto w-1.5 h-1.5 bg-white rounded-full animate-camera-flash"></div>
                            </div>
                            <div class="flex flex-col justify-center items-center" dir="ltr">
                                <h1 class="text-3xl md:text-4xl font-signature text-stone-900 leading-none pt-2 flex items-center justify-center gap-2">
                                    Mahmoud Elmrakby
                                </h1>
                                <p class="text-[9px] md:text-[10px] text-stone-500 uppercase tracking-[0.3em] font-bold -mt-1 text-center">Photography Studio</p>
                            </div>
                        </div>
                    </div>
                    <div class="pb-3 flex justify-center w-full overflow-hidden">
                        <nav class="flex items-center gap-1 bg-white/40 border border-white/50 shadow-sm p-1.5 rounded-2xl w-full md:w-max overflow-x-auto hide-scrollbar">
                            ${['photography:camera:باقات الزفاف', 'photoOnly:focus:Photography Only', 'video:video:الفيديو والسينما', 'tableaus:image:التابلوهات', 'gifts:gift:الهدايا'].map(t => {
                                const [id, icon, text] = t.split(':');
                                const activeCls = `tab-active-${id}`;
                                const isActive = state.activeTab === id;
                                return `<button onclick="changeTab('${id}')" class="flex-1 md:flex-none flex items-center justify-center gap-1.5 px-4 md:px-6 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-bold transition-all duration-300 whitespace-nowrap cursor-pointer ${isActive ? activeCls : 'tab-inactive'}">
                                    <i data-lucide="${icon}" class="w-4 h-4"></i> <span>${text}</span>
                                </button>`;
                            }).join('')}
                        </nav>
                    </div>
                </div>
            </header>`;
        }

        window.renderPromoSection = () => {
            const promo = state.menuData.promos[state.activeTab];
            const c = document.getElementById('promo-container');
            const html = (promo && promo.isActive) ? `
                <div onclick="openBookingModal('promo')" class="cursor-pointer relative w-full max-w-4xl mx-auto rounded-[1.5rem] md:rounded-[2rem] overflow-hidden shadow-lg md:shadow-2xl mb-8 md:mb-12 group bg-gradient-to-br from-rose-600 via-pink-600 to-purple-700 text-white flex flex-row min-h-[140px] md:min-h-[180px] items-center transition-transform hover:scale-[1.02]">
                    <div class="absolute inset-y-0 right-0 w-2/5 md:w-5/12 overflow-hidden bg-stone-900 z-0">
                        ${promo.images.map((img, i) => `<img src="${img}" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out group-hover:scale-110 ${i === state.currentPromoIdx ? 'opacity-100' : 'opacity-0'}" />`).join('')}
                        <div class="absolute inset-0 bg-gradient-to-l from-transparent to-rose-900/80 z-10 pointer-events-none"></div>
                    </div>
                    
                    <div class="relative z-10 w-3/5 md:w-7/12 p-4 sm:p-6 md:p-8 flex flex-col justify-center mr-auto">
                        <div class="inline-flex items-center gap-1.5 bg-white/20 backdrop-blur-md px-2.5 py-1 rounded-full w-max text-[10px] md:text-sm font-bold mb-2 md:mb-3 border border-white/30">
                            <i data-lucide="flame" class="w-3 h-3 md:w-4 md:h-4 text-amber-300"></i> عرض ${promo.categoryName || 'خاص'}
                        </div>
                        <h2 class="text-base sm:text-xl md:text-3xl lg:text-4xl font-black mb-3 md:mb-5 leading-tight line-clamp-2 drop-shadow-md" title="${promo.title}">${promo.title}</h2>
                        
                        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-4 mt-auto">
                            <span class="text-xl sm:text-2xl md:text-4xl font-black text-amber-300 leading-none drop-shadow-md">${promo.price}</span>
                            <span class="bg-white/20 hover:bg-white/30 backdrop-blur-md px-3 py-1.5 md:px-4 md:py-2 rounded-lg text-[10px] md:text-sm font-bold transition-colors flex items-center gap-1 shadow-md">
                                التفاصيل والحجز <i data-lucide="arrow-left" class="w-3 h-3 md:w-4 md:h-4"></i>
                            </span>
                        </div>
                    </div>
                </div>` : '';
            if (c) { c.innerHTML = html; lucide.createIcons(); }
            return html;
        };

        function renderControls() {
            return `
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 relative">
                <h2 class="text-2xl md:text-3xl font-black text-stone-800 tracking-tight flex items-center gap-2">استكشف خدماتنا <span class="text-xl">✨</span></h2>
            </div>`;
        }

        const categoryThemes = {
            photography: { cardBg: 'bg-gradient-to-br from-orange-100/95 to-amber-50/95', borderNorm: 'border-orange-300 shadow-xl shadow-orange-500/10 hover:border-orange-500', borderPop: 'border-orange-500 shadow-[0_15px_50px_rgba(249,115,22,0.3)]', text: 'text-orange-500', badge: 'bg-gradient-to-r from-amber-500 to-orange-500', btn: 'bg-gradient-to-r from-amber-500 to-orange-500 text-white hover:from-amber-400 hover:to-orange-400' },
            photoOnly: { cardBg: 'bg-white/80', borderNorm: 'border-indigo-200 shadow-sm hover:border-indigo-400 hover:shadow-md', borderPop: 'border-indigo-500 shadow-md', text: 'text-indigo-600', badge: '', btn: 'bg-gradient-to-r from-indigo-500 to-violet-600 text-white hover:from-indigo-400 hover:to-violet-500' },
            video: { cardBg: 'bg-gradient-to-br from-cyan-100/95 to-blue-50/95', borderNorm: 'border-cyan-300 shadow-xl shadow-cyan-500/10 hover:border-cyan-500', borderPop: 'border-cyan-500 shadow-[0_15px_50px_rgba(6,182,212,0.3)]', text: 'text-cyan-500', badge: 'bg-gradient-to-r from-blue-400 to-cyan-500', btn: 'bg-gradient-to-r from-blue-500 to-cyan-500 text-white hover:from-blue-400 hover:to-cyan-400' },
            tableaus: { cardBg: 'bg-gradient-to-br from-pink-100/95 to-fuchsia-50/95', borderNorm: 'border-pink-300 shadow-xl shadow-pink-500/10 hover:border-pink-500', borderPop: 'border-pink-500 shadow-[0_15px_50px_rgba(236,72,153,0.3)]', text: 'text-pink-500', badge: 'bg-gradient-to-r from-fuchsia-400 to-pink-500', btn: 'bg-gradient-to-r from-fuchsia-500 to-pink-500 text-white hover:from-fuchsia-400 hover:to-pink-400' },
            gifts: { cardBg: 'bg-gradient-to-br from-teal-100/95 to-emerald-50/95', borderNorm: 'border-teal-300 shadow-xl shadow-teal-500/10 hover:border-teal-500', borderPop: 'border-teal-500 shadow-[0_15px_50px_rgba(20,184,166,0.3)]', text: 'text-teal-500', badge: 'bg-gradient-to-r from-emerald-400 to-teal-500', btn: 'bg-gradient-to-r from-emerald-500 to-teal-500 text-white hover:from-emerald-400 hover:to-teal-400' }
        };

        window.renderItemsSection = () => {
            const items = state.menuData[state.activeTab];
            let html = '';
            const t = state.activeTab;
            const th = categoryThemes[t] || categoryThemes.photography;

            if (t === 'photography' || t === 'video') {
                html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">` + items.map(pkg => `
                    <div class="relative ${th.cardBg} backdrop-blur-lg rounded-[2rem] border-[3px] flex flex-col overflow-hidden transition-all duration-300 hover:-translate-y-2 group ${pkg.isPopular ? th.borderPop : th.borderNorm}">
                        ${pkg.isPopular ? `<div class="absolute top-4 left-4 z-20 ${th.badge} text-white px-4 py-1.5 rounded-full text-xs font-bold tracking-wider uppercase flex items-center gap-1 shadow-lg shadow-orange-500/30"><i data-lucide="star" class="w-3 h-3 fill-current"></i> الأكثر طلباً</div>` : ''}
                        <div class="relative h-56 w-full flex gap-1 bg-stone-100">
                            ${pkg.images && pkg.images.length > 0 ? `
                                <div class="w-2/3 h-full overflow-hidden"><img src="${pkg.images[0]}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" /></div>
                                <div class="w-1/3 h-full flex flex-col gap-1">
                                    ${pkg.images[1] ? `<div class="h-1/2 w-full overflow-hidden"><img src="${pkg.images[1]}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 delay-100" /></div>` : ''}
                                    ${pkg.images[2] ? `<div class="h-1/2 w-full overflow-hidden"><img src="${pkg.images[2]}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 delay-200" /></div>` : ''}
                                </div>
                            ` : `<div class="w-full h-full bg-stone-200 flex items-center justify-center"><i data-lucide="image" class="w-10 h-10 text-stone-400"></i></div>`}
                            <div class="absolute inset-0 bg-gradient-to-t from-white via-white/50 to-transparent"></div>
                        </div>
                        <div class="p-6 flex-1 flex flex-col justify-end items-center text-center -mt-16 z-10">
                            <h3 class="text-2xl font-bold text-stone-900 mb-2">${pkg.name}</h3>
                            <div class="flex items-end justify-center gap-1 mb-6"><span class="text-4xl font-black ${th.text}">${pkg.price}</span><span class="text-stone-500 mb-1 font-bold">ج.م</span></div>
                            <button onclick="openBookingModal(${pkg.id})" class="w-full py-3.5 rounded-xl font-bold transition-all flex items-center justify-center gap-2 ${th.btn} shadow-lg">عرض التفاصيل والحجز</button>
                        </div>
                    </div>
                `).join('') + `</div>`;
            } else if (t === 'photoOnly') {
                const mainItems = items.filter(i => !i.isMini);
                const miniItems = items.filter(i => i.isMini);
                html = `<div class="space-y-10">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${mainItems.map(item => `
                            <div class="relative ${th.cardBg} backdrop-blur-lg border-2 rounded-3xl overflow-hidden transition-all group flex items-center p-3 gap-4 hover:-translate-y-1 ${th.borderNorm}">
                                <div class="w-24 h-24 shrink-0 rounded-xl overflow-hidden bg-stone-100 relative">
                                    ${item.images?.[0] ? `<img src="${item.images[0]}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />` : `<div class="w-full h-full flex items-center justify-center"><i data-lucide="focus" class="w-6 h-6 text-stone-400"></i></div>`}
                                    <div class="absolute inset-0 bg-gradient-to-tr from-indigo-500/10 to-transparent mix-blend-overlay"></div>
                                </div>
                                <div class="flex-1 flex flex-col justify-between py-1 min-w-0">
                                    <div class="mb-2"><h3 class="text-base font-bold text-stone-900 mb-1 truncate pr-8">${item.name}</h3><p class="text-stone-500 text-xs line-clamp-2 leading-relaxed">${item.desc}</p></div>
                                    <div class="flex justify-between items-center mt-auto"><div class="flex items-center gap-1"><span class="text-lg font-black ${th.text} leading-none">${item.price}</span><span class="text-[10px] text-stone-500 font-bold">ج.م</span></div><button onclick="openBookingModal(${item.id})" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${th.btn} shadow-md">احجز</button></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    ${miniItems.length > 0 ? `
                    <div>
                        <h3 class="text-xl font-bold text-stone-800 mb-4 flex items-center gap-2"><i data-lucide="sparkles" class="w-5 h-5 text-indigo-500"></i> باقات مصغرة وإضافات</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            ${miniItems.map(item => {
                                const isAdded = state.selectedAddons.some(a => a.id === item.id);
                                return `<div class="relative bg-white/80 backdrop-blur-lg border ${isAdded ? 'border-emerald-400 shadow-md' : 'border-indigo-100 shadow-sm'} rounded-2xl p-4 flex flex-col transition-all group hover:-translate-y-1">
                                    <h4 class="font-bold text-stone-900 text-sm mb-1 pr-1">${item.name}</h4>
                                    <p class="text-xs text-stone-500 mb-4 flex-1 line-clamp-3 leading-relaxed pr-1">${item.desc}</p>
                                    <div class="flex justify-between items-center mt-auto border-t border-stone-100 pt-3">
                                        <div class="flex items-center gap-1 shrink-0"><span class="text-lg font-black leading-none ${isAdded ? 'text-emerald-600' : th.text}">${item.price}</span><span class="text-[10px] text-stone-500 font-bold">ج.م</span></div>
                                        <div class="flex gap-1.5">
                                            <button onclick="openBookingModal(${item.id})" class="px-2.5 py-1.5 rounded-lg text-xs font-bold transition-all bg-stone-100 text-stone-600 hover:bg-indigo-600 hover:text-white shadow-sm">احجز</button>
                                            <button onclick="toggleAddon(${item.id})" class="px-2.5 py-1.5 rounded-lg text-[10px] font-bold transition-all flex items-center gap-1 ${isAdded ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-50 text-rose-600 hover:bg-rose-500 hover:text-white'}"><i data-lucide="${isAdded ? 'check-circle-2' : 'plus'}" class="w-3 h-3"></i> ${isAdded ? 'مضافة' : 'للباقة'}</button>
                                        </div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>` : ''}
                </div>`;
            } else {
                html = `<div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4 md:gap-5 lg:gap-6">` + items.map(item => `
                    <div class="relative ${th.cardBg} backdrop-blur-lg border-2 md:border-[3px] shadow-sm md:shadow-lg rounded-xl md:rounded-2xl overflow-hidden ${th.borderNorm} hover:-translate-y-1 transition-all group flex flex-col">
                        <div class="h-32 sm:h-40 md:h-48 lg:h-64 w-full overflow-hidden bg-stone-100 relative">
                            ${item.images?.[0] ? `<img src="${item.images[0]}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />` : `<div class="w-full h-full flex items-center justify-center"><i data-lucide="image" class="w-6 h-6 md:w-8 md:h-8 text-stone-400"></i></div>`}
                            <div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-transparent"></div>
                        </div>
                        <div class="p-3 md:p-4 lg:p-5 flex flex-col flex-1">
                            <h3 class="text-xs sm:text-sm md:text-base lg:text-lg font-bold text-stone-900 mb-1 leading-tight line-clamp-1">${item.name}</h3>
                            <p class="text-stone-500 text-[9px] sm:text-[10px] md:text-xs lg:text-sm mb-2 md:mb-3 flex-1 line-clamp-2">${item.desc}</p>
                            
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mt-auto pt-2 border-t border-stone-100 gap-1.5 sm:gap-0">
                                <div class="flex items-end gap-1">
                                    <span class="text-sm sm:text-base md:text-xl lg:text-2xl font-black ${th.text} leading-none">${item.price}</span>

                packageName: state.bookingItem.name,
                packagePrice: state.bookingItem.price,
                addons: state.selectedAddons,
                date: fd.get('date'),
